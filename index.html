  <base href="https://cdn.jsdelivr.net/gh/aukak/fyinx@latest/g/balatro/">
  <meta charset="utf-8">
  <meta http-equiv="Content-Type" content="text/html; charset=utf-8">

  <title>Balatro</title>
  <link rel="stylesheet" type="text/css" href="https://cdn.jsdelivr.net/gh/aukak/fyinx@main/g/balatro/theme/love.css">
  <script src="https://cdn.jsdelivr.net/gh/aukak/fyinx@main/g/balatro/consolewrapper.js"></script>

  <style>
    * { box-sizing: border-box; }

    /* ── Modal overlay ── */
    #save-modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 99999;
      background: rgba(0, 0, 0, 0.72);
      align-items: center;
      justify-content: center;
    }
    #save-modal-overlay.open { display: flex; }

    #save-modal {
      background: #1a1a2e;
      border: 1px solid #3a3a5c;
      border-radius: 12px;
      padding: 28px 32px;
      width: 380px;
      max-width: 95vw;
      font-family: arial, sans-serif;
      color: #e8e8f0;
      box-shadow: 0 8px 40px rgba(0,0,0,0.6);
    }

    #save-modal h2 {
      margin: 0 0 6px;
      font-size: 18px;
      font-weight: 600;
      color: #fff;
      letter-spacing: 0.02em;
    }
    #save-modal .subtitle {
      font-size: 12px;
      color: #7777aa;
      margin: 0 0 22px;
    }

    .modal-section {
      border-top: 1px solid #2e2e50;
      padding-top: 16px;
      margin-top: 16px;
    }
    .modal-section-label {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #7777aa;
      margin-bottom: 10px;
    }

    .modal-btn {
      display: flex;
      align-items: center;
      gap: 9px;
      width: 100%;
      padding: 10px 14px;
      font-size: 14px;
      font-family: arial, sans-serif;
      cursor: pointer;
      border-radius: 8px;
      border: 1px solid #3a3a5c;
      background: #22223a;
      color: #dde;
      text-align: left;
      margin-bottom: 8px;
      transition: background 0.15s;
    }
    .modal-btn:last-child { margin-bottom: 0; }
    .modal-btn:hover { background: #2e2e52; }
    .modal-btn .btn-icon { font-size: 16px; flex-shrink: 0; }
    .modal-btn .btn-label { flex: 1; }
    .modal-btn .btn-hint { font-size: 11px; color: #7777aa; }

    /* Auto-save toggle row */
    .autosave-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 14px;
      border-radius: 8px;
      border: 1px solid #3a3a5c;
      background: #22223a;
      margin-bottom: 8px;
    }
    .autosave-row .as-info { display: flex; flex-direction: column; gap: 2px; }
    .autosave-row .as-title { font-size: 14px; color: #dde; }
    .autosave-row .as-sub { font-size: 11px; color: #7777aa; }

    .toggle-wrap { display: flex; align-items: center; gap: 8px; }
    .toggle {
      position: relative;
      width: 40px;
      height: 22px;
      flex-shrink: 0;
    }
    .toggle input { opacity: 0; width: 0; height: 0; }
    .toggle-slider {
      position: absolute;
      inset: 0;
      background: #3a3a5c;
      border-radius: 22px;
      cursor: pointer;
      transition: background 0.2s;
    }
    .toggle-slider:before {
      content: '';
      position: absolute;
      width: 16px;
      height: 16px;
      left: 3px;
      top: 3px;
      background: #aaa;
      border-radius: 50%;
      transition: transform 0.2s, background 0.2s;
    }
    .toggle input:checked + .toggle-slider { background: #5b4fcf; }
    .toggle input:checked + .toggle-slider:before { transform: translateX(18px); background: #fff; }

    /* Status bar */
    #save-status {
      margin-top: 16px;
      font-size: 12px;
      color: #aef;
      background: rgba(80,80,160,0.18);
      border: 1px solid #3a3a5c;
      border-radius: 6px;
      padding: 7px 12px;
      display: none;
      line-height: 1.4;
    }
    #save-status.ok  { color: #7fc97f; }
    #save-status.err { color: #f77; }

    /* Close hint */
    .modal-close-hint {
      margin-top: 18px;
      text-align: center;
      font-size: 11px;
      color: #555577;
    }
    kbd {
      display: inline-block;
      padding: 1px 5px;
      border: 1px solid #444466;
      border-radius: 4px;
      font-family: monospace;
      font-size: 11px;
      color: #8888bb;
    }

    /* Auto-save file indicator */
    .as-file-row {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 14px;
      border-radius: 8px;
      border: 1px solid #3a3a5c;
      background: #1c1c30;
      margin-bottom: 8px;
      font-size: 12px;
      color: #7777aa;
    }
    .as-file-row .as-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: #444466;
      flex-shrink: 0;
    }
    .as-file-row.active .as-dot { background: #5b4fcf; }
    .as-file-row.active { color: #aaa8dd; }

    /* Canvas stuff */
    #loadingCanvas, #canvas { display: block; }
  </style>
</head>

<body>

  <!-- ── Save Modal ── -->
  <div id="save-modal-overlay" role="dialog" aria-modal="true" aria-label="Save Manager">
    <div id="save-modal">
      <h2>&#128190; Save Manager</h2>
      <p class="subtitle">Press <kbd>[</kbd> to toggle &nbsp;·&nbsp; Save data lives in Emscripten virtual FS (synced to IndexedDB)</p>

      <!-- Manual export/import -->
      <div class="modal-section-label">Manual save file</div>

      <button class="modal-btn" onclick="exportSave()">
        <span class="btn-icon">&#8681;</span>
        <span class="btn-label">Export save</span>
        <span class="btn-hint">Downloads a .json file</span>
      </button>

      <button class="modal-btn" onclick="document.getElementById('import-input').click()">
        <span class="btn-icon">&#8679;</span>
        <span class="btn-label">Import save</span>
        <span class="btn-hint">Replaces current save (live, no reload needed)</span>
      </button>
      <input type="file" id="import-input" accept=".json" style="display:none" onchange="importSave(event)">

      <!-- Auto-save section -->
      <div class="modal-section">
        <div class="modal-section-label">Auto-save to disk (File System Access API)</div>

        <div class="autosave-row">
          <div class="as-info">
            <span class="as-title">Auto-save</span>
            <span class="as-sub" id="as-interval-label">Saves to a file on your computer every 30s</span>
          </div>
          <div class="toggle-wrap">
            <label class="toggle">
              <input type="checkbox" id="autosave-toggle" onchange="toggleAutoSave()">
              <span class="toggle-slider"></span>
            </label>
          </div>
        </div>

        <div class="as-file-row" id="as-file-indicator">
          <span class="as-dot"></span>
          <span id="as-file-label">No file selected — enable auto-save to pick one</span>
        </div>

        <button class="modal-btn" id="as-save-now-btn" onclick="autoSaveNow()" style="display:none">
          <span class="btn-icon">&#9654;</span>
          <span class="btn-label">Save now</span>
          <span class="btn-hint">Write to file immediately</span>
        </button>
      </div>

      <div id="save-status"></div>

      <p class="modal-close-hint">Press <kbd>[</kbd> or click outside to close</p>
    </div>
  </div>

  <!-- ── Game canvases ── -->
  <center>
    <div>
      <canvas id="loadingCanvas" oncontextmenu="event.preventDefault()" width="800" height="600"></canvas>
      <canvas id="canvas" oncontextmenu="event.preventDefault()" width="100%" height="100%"></canvas>
    </div>
  </center>

  <script>
    // ────────────────────────────────────────────────
    // Config
    // ────────────────────────────────────────────────
    const SAVE_DIR             = '/home/web_user/love';
    const AUTOSAVE_INTERVAL_MS = 30000;

    // ────────────────────────────────────────────────
    // Modal open/close
    // ────────────────────────────────────────────────
    const overlay = document.getElementById('save-modal-overlay');

    function openModal()  { overlay.classList.add('open'); }
    function closeModal() { overlay.classList.remove('open'); }

    overlay.addEventListener('click', e => {
      if (e.target === overlay) closeModal();
    });

    document.addEventListener('keydown', e => {
      if (e.key === '[') {
        e.preventDefault();
        overlay.classList.contains('open') ? closeModal() : openModal();
      }
      if (e.key === 'Escape') closeModal();
    });

    // ────────────────────────────────────────────────
    // Status helper
    // ────────────────────────────────────────────────
    function showStatus(msg, type) {
      const el = document.getElementById('save-status');
      el.textContent = msg;
      el.className   = type || '';
      el.style.display = 'block';
      clearTimeout(el._t);
      el._t = setTimeout(() => { el.style.display = 'none'; }, 5000);
    }

    // ────────────────────────────────────────────────
    // FS helpers — wrap Emscripten FS in promises
    // ────────────────────────────────────────────────

    /** Pull IndexedDB → virtual FS memory */
    function fsSyncIn() {
      return new Promise((res, rej) =>
        FS.syncfs(true, err => err ? rej(err) : res())
      );
    }

    /** Push virtual FS memory → IndexedDB */
    function fsSyncOut() {
      return new Promise((res, rej) =>
        FS.syncfs(false, err => err ? rej(err) : res())
      );
    }

    /** Recursively read every file under a directory into a flat { path: number[] } map */
    function fsReadAll(dirPath) {
      const entries = {};
      function walk(p) {
        let items;
        try { items = FS.readdir(p); } catch(e) { return; }
        for (const item of items) {
          if (item === '.' || item === '..') continue;
          const full = p + '/' + item;
          try {
            const stat = FS.stat(full);
            if (FS.isDir(stat.mode)) {
              walk(full);
            } else {
              entries[full] = Array.from(FS.readFile(full));
            }
          } catch(e) { /* skip unreadable */ }
        }
      }
      walk(dirPath);
      return entries;
    }

    /** Write a flat { path: number[] } map back into the virtual FS */
    function fsWriteAll(entries) {
      for (const [path, bytes] of Object.entries(entries)) {
        const dir = path.substring(0, path.lastIndexOf('/'));
        try { FS.mkdirTree(dir); } catch(e) { /* already exists */ }
        try {
          FS.writeFile(path, new Uint8Array(bytes));
        } catch(e) {
          console.warn('fsWriteAll: could not write', path, e);
        }
      }
    }

    /** Return true if the Emscripten FS is ready to use */
    function fsReady() {
      return typeof FS !== 'undefined' && typeof FS.syncfs === 'function';
    }

    // ────────────────────────────────────────────────
    // Manual export  (FS → JSON file download)
    // ────────────────────────────────────────────────
    async function exportSave() {
      if (!fsReady()) { showStatus('Game not loaded yet — wait for it to finish loading.', 'err'); return; }
      try {
        showStatus('Syncing from IndexedDB…');
        await fsSyncIn();                        // make sure memory is up-to-date

        const entries = fsReadAll(SAVE_DIR);
        const count   = Object.keys(entries).length;
        if (count === 0) {
          showStatus('No save files found in ' + SAVE_DIR, 'err');
          return;
        }

        const blob = new Blob([JSON.stringify(entries, null, 2)], { type: 'application/json' });
        const url  = URL.createObjectURL(blob);
        const a    = document.createElement('a');
        a.href     = url;
        a.download = 'balatro-save-' + new Date().toISOString().slice(0, 10) + '.json';
        a.click();
        URL.revokeObjectURL(url);
        showStatus('Exported ' + count + ' file(s)!', 'ok');
      } catch(err) {
        showStatus('Export failed: ' + err.message, 'err');
      }
    }

    // ────────────────────────────────────────────────
    // Manual import  (JSON file → FS → IndexedDB)
    // ────────────────────────────────────────────────
    async function importSave(event) {
      const file = event.target.files[0];
      if (!file) return;
      if (!fsReady()) { showStatus('Game not loaded yet — wait for it to finish loading.', 'err'); return; }

      try {
        showStatus('Importing…');
        const text    = await file.text();
        const entries = JSON.parse(text);

        if (typeof entries !== 'object' || Array.isArray(entries)) {
          showStatus('Invalid save file format.', 'err');
          return;
        }

        // Write files into virtual FS
        fsWriteAll(entries);

        // Persist to IndexedDB immediately
        await fsSyncOut();

        showStatus('Imported ' + Object.keys(entries).length + ' file(s)! Save is live — no reload needed.', 'ok');
      } catch(err) {
        showStatus('Import failed: ' + err.message, 'err');
      }
      event.target.value = '';
    }

    // ────────────────────────────────────────────────
    // File System Access API — auto-save
    // ────────────────────────────────────────────────
    let autoSaveHandle  = null;   // FileSystemFileHandle
    let autoSaveTimer   = null;
    let autoSaveEnabled = false;

    function updateAutoSaveUI() {
      const toggle    = document.getElementById('autosave-toggle');
      const indicator = document.getElementById('as-file-indicator');
      const fileLabel = document.getElementById('as-file-label');
      const saveNow   = document.getElementById('as-save-now-btn');

      toggle.checked = autoSaveEnabled;

      if (autoSaveEnabled && autoSaveHandle) {
        indicator.classList.add('active');
        fileLabel.textContent = 'Writing to: ' + autoSaveHandle.name;
        saveNow.style.display = 'flex';
        document.getElementById('as-interval-label').textContent = 'Saves every 30s to your chosen file';
      } else {
        indicator.classList.remove('active');
        fileLabel.textContent = autoSaveHandle
          ? 'File selected but auto-save is off: ' + autoSaveHandle.name
          : 'No file selected — enable auto-save to pick one';
        saveNow.style.display = autoSaveHandle ? 'flex' : 'none';
        document.getElementById('as-interval-label').textContent = 'Saves to a file on your computer every 30s';
      }
    }

    async function pickFileForAutoSave() {
      if (!('showSaveFilePicker' in window)) {
        showStatus('File System Access API not supported in this browser.', 'err');
        return false;
      }
      try {
        autoSaveHandle = await window.showSaveFilePicker({
          suggestedName: 'balatro-autosave.json',
          types: [{ description: 'JSON Save File', accept: { 'application/json': ['.json'] } }]
        });
        return true;
      } catch(err) {
        if (err.name !== 'AbortError') showStatus('File picker error: ' + err.message, 'err');
        return false;
      }
    }

    async function writeToFile(handle, data) {
      const writable = await handle.createWritable();
      await writable.write(data);
      await writable.close();
    }

    async function performAutoSave() {
      if (!autoSaveHandle || !fsReady()) return;
      try {
        await fsSyncIn();                        // pull latest from IDB into memory
        const entries = fsReadAll(SAVE_DIR);
        await writeToFile(autoSaveHandle, JSON.stringify(entries, null, 2));
        // Quiet success — no status spam on interval
      } catch(err) {
        showStatus('Auto-save failed: ' + err.message, 'err');
      }
    }

    async function toggleAutoSave() {
      const toggle = document.getElementById('autosave-toggle');

      if (toggle.checked) {
        if (!autoSaveHandle) {
          const picked = await pickFileForAutoSave();
          if (!picked) {
            toggle.checked  = false;
            autoSaveEnabled = false;
            updateAutoSaveUI();
            return;
          }
        }
        autoSaveEnabled = true;
        clearInterval(autoSaveTimer);
        autoSaveTimer = setInterval(performAutoSave, AUTOSAVE_INTERVAL_MS);
        await performAutoSave();
        showStatus('Auto-save enabled! Writing to: ' + autoSaveHandle.name, 'ok');
      } else {
        autoSaveEnabled = false;
        clearInterval(autoSaveTimer);
        autoSaveTimer = null;
        showStatus('Auto-save disabled.', '');
      }

      updateAutoSaveUI();
    }

    async function autoSaveNow() {
      if (!autoSaveHandle) { showStatus('No file selected yet.', 'err'); return; }
      if (!fsReady())      { showStatus('Game not loaded yet.', 'err');  return; }
      showStatus('Saving…');
      await performAutoSave();
      showStatus('Saved to ' + autoSaveHandle.name + '!', 'ok');
    }

    // ────────────────────────────────────────────────
    // Game bootstrap
    // ────────────────────────────────────────────────
    window.callad = () => {
      window.parent.postMessage({ type: 'adcall' }, '*');
    };

    var canvas    = document.getElementById("loadingCanvas");
    canvas.width  = window.innerWidth  || document.documentElement.clientWidth  || document.body.clientWidth;
    canvas.height = window.innerHeight || document.documentElement.clientHeight || document.body.clientHeight;

    function goFullScreen() {
      var c = document.getElementById("canvas");
      if      (c.requestFullScreen)       c.requestFullScreen();
      else if (c.webkitRequestFullScreen) c.webkitRequestFullScreen();
      else if (c.mozRequestFullScreen)    c.mozRequestFullScreen();
    }

    function FullScreenHook() {
      var c   = document.getElementById("canvas");
      c.width  = window.innerWidth  || document.documentElement.clientWidth  || document.body.clientWidth;
      c.height = window.innerHeight || document.documentElement.clientHeight || document.body.clientHeight;
    }

    var loadingContext = document.getElementById('loadingCanvas').getContext('2d');

    function drawLoadingText(text) {
      var c = loadingContext.canvas;
      loadingContext.fillStyle = "rgb(142, 195, 227)";
      loadingContext.fillRect(0, 0, c.scrollWidth, c.scrollHeight);
      loadingContext.font      = '2em arial';
      loadingContext.textAlign = 'center';
      loadingContext.fillStyle = "rgb(11, 86, 117)";
      loadingContext.fillText(text, c.scrollWidth / 2, c.scrollHeight / 2);
    }

    window.onload  = function() { window.focus(); };
    window.onclick = function() { window.focus(); };

    window.addEventListener("keydown", function(e) {
      if ([32, 37, 38, 39, 40].indexOf(e.keyCode) > -1) { e.preventDefault(); }
    }, false);

    var Module = {
      arguments: ["./game.love"],
      INITIAL_MEMORY: 256000000,
      printErr: console.error.bind(console),
      canvas: (function() {
        var c = document.getElementById('canvas');
        c.addEventListener("webglcontextlost", function(e) {
          alert('WebGL context lost. You will need to reload the page.');
          e.preventDefault();
        }, false);
        return c;
      })(),
      setStatus: function(text) {
        if (text) {
          drawLoadingText(text);
        } else if (Module.remainingDependencies === 0) {
          document.getElementById('loadingCanvas').style.display = 'none';
          document.getElementById('canvas').style.visibility     = 'visible';
        }
      },
      totalDependencies:     0,
      remainingDependencies: 0,
      monitorRunDependencies: function(left) {
        this.remainingDependencies = left;
        this.totalDependencies     = Math.max(this.totalDependencies, left);
        Module.setStatus(left
          ? 'Preparing… (' + (this.totalDependencies - left) + '/' + this.totalDependencies + ')'
          : 'All downloads complete.'
        );
      }
    };

    Module.setStatus('Downloading…');
    window.onerror = function() {
      Module.setStatus('Exception thrown, see JavaScript console');
      Module.setStatus = function(text) {
        if (text) Module.printErr('[post-exception status] ' + text);
      };
    };

    var applicationLoad = function() { Love(Module); };
  </script>
